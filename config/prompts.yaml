# =========================================
#  RAG 提示词模板（由 core/rag_chain.py 读取）
# =========================================

# 问答主模板：传入检索上下文与用户问题
qa_template: |
  你是一个专业的知识库问答助手。请仅基于下面检索到的【上下文】回答用户问题。
  若上下文中没有答案，请直接回答："抱歉，未在知识库中找到相关内容。"
  不要编造不在上下文中的信息。

  【上下文】
  {context}

  用户问题：{question}
  回答：

# 问题重写模板（多轮对话时重写问题；单问可忽略）
condense_template: |
  请根据对话历史将用户最新问题重写为一个独立的、清晰的问题。
  若没有对话历史，直接返回原问题。

  对话历史：
  {chat_history}
  用户最新问题：{question}
  独立问题：
